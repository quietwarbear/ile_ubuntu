<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Where elders preserve, faculty teach, and students carry knowledge forward. A digital schoolhouse for cohorts, archives, and community — free to start." />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.ile-ubuntu.org/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Ile Ubuntu — A Living Learning Commons" />
    <meta property="og:description" content="Not another LMS. A schoolhouse for the digital age. Cohorts, archives, and community in one coherent environment." />
    <meta property="og:image" content="https://www.ile-ubuntu.org/og-image.png" />
    <meta property="og:url" content="https://www.ile-ubuntu.org/" />
    <meta property="og:type" content="website" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.ile-ubuntu.org/og-image.png" />
    <meta name="twitter:title" content="Ile Ubuntu — A Living Learning Commons" />
    <meta name="twitter:description" content="Where elders preserve, faculty teach, and students carry knowledge forward. A digital schoolhouse for cohorts, archives, and community." />

    <!-- Cache busting -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Ile Ubuntu">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ile Ubuntu">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-config" content="%PUBLIC_URL%/browserconfig.xml">
    <meta name="msapplication-TileColor" content="#0f172a">
    <meta name="msapplication-tap-highlight" content="no">

    <!-- iOS Splash Screens -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/icon-512.png">

    <!-- Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-512.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json?v=2" />

    <title>Ile Ubuntu — A Living Learning Commons</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run The Ile Ubuntu app.</noscript>
    <div id="root"></div>
    
    <!-- PWA Install Prompt -->
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }

      // PWA Install Prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        // Stash the event so it can be triggered later.
        deferredPrompt = e;
        
        // Show install button or banner
        console.log('PWA install prompt available');
      });

      // Handle PWA install
      window.addEventListener('appinstalled', (evt) => {
        console.log('The Ile Ubuntu PWA was installed');
      });
    </script>
  </body>
</html>
